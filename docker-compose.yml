version: '3.8'

services:
  ops-center:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: power-converter-ops-center
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://postgres:secret@postgres:5432/power_ops
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: power-ops-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=power_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d power_ops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
